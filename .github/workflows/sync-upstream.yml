name: Sync from upstream

on:
  schedule:
    - cron: '0 7 * * 1'   # Понедельник 11:00 по Самаре (UTC+4)
    - cron: '0 7 * * 4'   # Четверг 11:00 по Самаре (UTC+4)
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Add upstream & fetch
        run: |
          git remote add upstream https://github.com/awaik/direct-mcp-ai-project.git
          git fetch upstream

      - name: Check for new commits
        id: check
        run: |
          BEHIND=$(git rev-list HEAD..upstream/main --count)
          if [ "$BEHIND" -eq 0 ]; then
            echo "has_updates=false" >> $GITHUB_OUTPUT
            echo "Already up to date"
          else
            echo "has_updates=true" >> $GITHUB_OUTPUT
            echo "$BEHIND new commits from upstream"
          fi

      - name: Backup protected files
        if: steps.check.outputs.has_updates == 'true'
        run: cp PROJECTS.md /tmp/PROJECTS_BACKUP.md

      - name: Merge upstream (upstream wins conflicts, except our files)
        if: steps.check.outputs.has_updates == 'true'
        run: |
          git merge upstream/main \
            -X theirs \
            --no-edit \
            --allow-unrelated-histories \
            -m "chore: sync upstream $(date +%F)" || true

      - name: Restore PROJECTS.md
        if: steps.check.outputs.has_updates == 'true'
        run: |
          cp /tmp/PROJECTS_BACKUP.md PROJECTS.md
          git add PROJECTS.md
          git diff --staged --quiet || \
            git commit -m "chore: keep PROJECTS.md after sync"

      - name: Push to fork
        if: steps.check.outputs.has_updates == 'true'
        run: git push origin main
