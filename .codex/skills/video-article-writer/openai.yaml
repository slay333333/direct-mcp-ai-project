name: video-article-writer
description: "Написание большой SEO-статьи для веба на основе видеофайла или расшифровки: спрашивает ресурс публикации, стиль из .styles и режим подачи, затем делает аудио, LidFly-транскрипцию, semantic-core, статью 8000+ символов, ai-markers-remove, редакторское ревью, SEO-поля и горизонтальную обложку через Codex imagegen после подтверждения пользователя."
version: 1
interface:
  display_name: Video Article Writer
  short_description: SEO-статья из видео с выбором ресурса и стиля
  default_prompt: Use $video-article-writer to turn this video file into a long SEO article. Ask for publication resource, style from .styles, and editorial mode before writing.
